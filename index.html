<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/marked@15.0.6/marked.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js" defer></script>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  :root {
    --bg: #faf9f6;
    --bg-sidebar: #f5f4f0;
    --bg-hover: #eceae4;
    --bg-active: #e3e1d9;
    --bg-search: #eeede8;
    --bg-content: #ffffff;
    --bg-code-inline: #f0efe9;
    --bg-code-block: #1e1e2e;
    --text: #1c1917;
    --text-secondary: #6b6560;
    --text-tertiary: #a39e98;
    --text-on-accent: #ffffff;
    --border: #e3e0d8;
    --border-light: #efede7;
    --accent: #7c3aed;
    --accent-light: #f3e8ff;
    --accent-bg: #faf5ff;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
    --radius: 10px;
    --radius-sm: 6px;
    --radius-xs: 4px;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Helvetica, Arial, sans-serif;
    --font-mono: "SF Mono", "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
    --sidebar-width: 300px;
    --header-height: 56px;
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body {
    font-family: var(--font);
    color: var(--text);
    background: var(--bg);
    line-height: 1.7;
    overflow: hidden;
    height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  #app {
    display: flex;
    height: 100vh;
  }
  #sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 10;
  }
  .sidebar-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .sidebar-header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .sidebar-header h1 a {
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-header h1 .logo-icon {
    width: 24px;
    height: 24px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    border-radius: var(--radius-xs);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #fff;
    flex-shrink: 0;
  }
  .sidebar-actions {
    display: flex;
    gap: 4px;
  }
  .sidebar-actions button {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    border-radius: var(--radius-xs);
    cursor: pointer;
    font-size: 15px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition), color var(--transition);
  }
  .sidebar-actions button:hover {
    background: var(--bg-hover);
    color: var(--text);
  }
  .search-wrapper {
    position: relative;
  }
  .search-wrapper .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: var(--text-tertiary);
    pointer-events: none;
  }
  #search-input {
    width: 100%;
    padding: 8px 12px 8px 32px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: var(--font);
    background: var(--bg-search);
    color: var(--text);
    outline: none;
    transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
  }
  #search-input:focus {
    border-color: var(--accent);
    background: var(--bg-content);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.08);
  }
  #search-input::placeholder {
    color: var(--text-tertiary);
  }
  .search-count {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-top: 6px;
    display: none;
    padding-left: 4px;
  }
  #tree-container {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0 12px;
  }
  #tree-container::-webkit-scrollbar {
    width: 4px;
  }
  #tree-container::-webkit-scrollbar-track {
    background: transparent;
  }
  #tree-container::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
  #tree-container::-webkit-scrollbar-thumb:hover {
    background: var(--text-tertiary);
  }
  .tree-list {
    list-style: none;
    padding-left: 0;
  }
  .tree-list .tree-list {
    padding-left: 16px;
  }
  .tree-item {
    user-select: none;
  }
  .tree-item-content {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    margin: 0 6px;
    font-size: 13px;
    line-height: 1.4;
    cursor: pointer;
    color: var(--text-secondary);
    transition: background var(--transition), color var(--transition);
    border-radius: var(--radius-sm);
    text-decoration: none;
  }
  .tree-item-content:hover {
    background: var(--bg-hover);
    color: var(--text);
  }
  .tree-item-content.active {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
  }
  .tree-item-content.active .icon {
    opacity: 1;
  }
  .tree-item-content .icon {
    flex-shrink: 0;
    font-size: 13px;
    width: 18px;
    text-align: center;
    opacity: 0.7;
    transition: opacity var(--transition);
  }
  .tree-item-content:hover .icon {
    opacity: 1;
  }
  .tree-item-content .label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tree-item-content .arrow {
    flex-shrink: 0;
    font-size: 8px;
    width: 14px;
    text-align: center;
    transition: transform var(--transition);
    opacity: 0.4;
    color: var(--text-tertiary);
  }
  .tree-item-content .arrow.expanded {
    transform: rotate(90deg);
  }
  .tree-item.children-hidden > .tree-list {
    display: none;
  }
  .tree-section-label {
    padding: 10px 16px 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-tertiary);
  }
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
    background: var(--bg);
  }
  #main-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 28px;
    height: var(--header-height);
    border-bottom: 1px solid var(--border-light);
    flex-shrink: 0;
    background: var(--bg-content);
  }
  #menu-btn {
    display: none;
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text-secondary);
    padding: 6px;
    border-radius: var(--radius-sm);
    transition: background var(--transition);
  }
  #menu-btn:hover {
    background: var(--bg-hover);
  }
  #breadcrumb {
    font-size: 13px;
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 0;
  }
  #breadcrumb span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #breadcrumb .sep {
    color: var(--text-tertiary);
    font-size: 12px;
    opacity: 0.4;
  }
  #content-wrapper {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }
  #content-wrapper::-webkit-scrollbar {
    width: 6px;
  }
  #content-wrapper::-webkit-scrollbar-track {
    background: transparent;
  }
  #content-wrapper::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
  #content-wrapper::-webkit-scrollbar-thumb:hover {
    background: var(--text-tertiary);
  }
  #content-area {
    padding: 40px 48px 80px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
    min-height: 100%;
    animation: contentFadeIn 0.3s ease;
  }
  @keyframes contentFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  #content-area img {
    max-width: 100%;
    border-radius: var(--radius-sm);
    margin: 20px 0;
    box-shadow: var(--shadow-md);
  }
  #content-area a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color var(--transition);
  }
  #content-area a:hover {
    border-bottom-color: var(--accent);
  }
  #content-area h1, #content-area h2, #content-area h3, #content-area h4 {
    margin-top: 32px;
    margin-bottom: 12px;
    font-weight: 650;
    line-height: 1.35;
    letter-spacing: -0.015em;
    color: var(--text);
  }
  #content-area h1 {
    font-size: 30px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 20px;
    margin-top: 0;
  }
  #content-area h2 {
    font-size: 23px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-light);
  }
  #content-area h3 { font-size: 19px; }
  #content-area h4 { font-size: 16px; }
  #content-area p {
    margin-bottom: 18px;
    color: var(--text);
  }
  #content-area ul, #content-area ol {
    margin-bottom: 18px;
    padding-left: 24px;
  }
  #content-area li {
    margin-bottom: 4px;
  }
  #content-area li > ul, #content-area li > ol {
    margin-bottom: 0;
    margin-top: 4px;
  }
  #content-area blockquote {
    margin: 20px 0;
    padding: 12px 20px;
    border-left: 3px solid var(--accent);
    background: var(--accent-bg);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    color: var(--text-secondary);
  }
  #content-area blockquote p {
    margin-bottom: 0;
    color: inherit;
  }
  #content-area blockquote p + p {
    margin-top: 12px;
  }
  #content-area code {
    font-family: var(--font-mono);
    font-size: 13px;
    background: var(--bg-code-inline);
    padding: 2px 7px;
    border-radius: var(--radius-xs);
    color: #7c3aed;
    border: 1px solid var(--border-light);
  }
  #content-area pre {
    margin: 20px 0;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg-code-block);
    position: relative;
    box-shadow: var(--shadow-md);
  }
  #content-area pre .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: var(--font);
    color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: var(--radius-xs);
    cursor: pointer;
    opacity: 0;
    transition: opacity var(--transition), background var(--transition), color var(--transition);
    z-index: 2;
  }
  #content-area pre:hover .copy-btn {
    opacity: 1;
  }
  #content-area pre .copy-btn:hover {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.85);
  }
  #content-area pre .copy-btn.copied {
    background: rgba(16,185,129,0.2);
    color: #34d399;
    border-color: rgba(16,185,129,0.3);
  }
  #content-area pre code {
    all: unset;
    font-family: var(--font-mono);
    font-size: 13.5px;
    line-height: 1.6;
    display: block;
    padding: 20px 24px;
    color: #e2e8f0;
    background: transparent;
    overflow-x: auto;
    tab-size: 2;
  }
  #content-area table {
    border-collapse: collapse;
    margin: 20px 0;
    width: 100%;
    font-size: 14px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  #content-area th, #content-area td {
    border: 1px solid var(--border);
    padding: 10px 14px;
    text-align: left;
  }
  #content-area th {
    background: var(--bg-sidebar);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-secondary);
  }
  #content-area hr {
    border: none;
    height: 1px;
    background: var(--border-light);
    margin: 32px 0;
  }
  #content-area .empty-state {
    text-align: center;
    padding: 100px 20px;
    color: var(--text-tertiary);
  }
  #content-area .empty-state .icon-wrap {
    width: 64px;
    height: 64px;
    background: var(--accent-bg);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px;
  }
  #content-area .empty-state h2 {
    border: none;
    font-size: 20px;
    margin-top: 0;
    color: var(--text-secondary);
    font-weight: 600;
  }
  #content-area .empty-state p {
    font-size: 14px;
    max-width: 400px;
    margin: 8px auto 0;
    color: var(--text-tertiary);
  }
  .search-result-item {
    padding: 14px 18px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background var(--transition);
    margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .search-result-item:hover {
    background: var(--bg-hover);
    border-color: var(--border-light);
  }
  .search-result-item .path {
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 3px;
    font-family: var(--font-mono);
  }
  .search-result-item .title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
  }
  .search-result-item .snippet {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .search-result-item .snippet mark {
    background: #fef3c7;
    color: #92400e;
    padding: 0 2px;
    border-radius: 2px;
  }
  #search-results {
    padding: 4px 0;
  }
  #search-results h2 {
    margin-top: 0;
  }
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--text-tertiary);
    font-size: 14px;
    gap: 10px;
  }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.5s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error-toast {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1c1917;
    color: #fff;
    padding: 10px 20px;
    border-radius: var(--radius);
    font-size: 13px;
    z-index: 100;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.3s ease;
    white-space: nowrap;
  }
  @keyframes slideUp {
    from { transform: translateX(-50%) translateY(16px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }
  @media (max-width: 768px) {
    :root {
      --sidebar-width: 280px;
      --header-height: 50px;
    }
    #sidebar {
      position: fixed;
      left: -300px;
      top: 0;
      bottom: 0;
      transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-lg);
    }
    #sidebar.open {
      left: 0;
    }
    #menu-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    #content-area {
      padding: 24px 20px 60px;
    }
    #main-header {
      padding: 0 16px;
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 9;
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }
    .sidebar-overlay.show {
      display: block;
    }
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0e12;
      --bg-sidebar: #16151a;
      --bg-hover: #1f1e24;
      --bg-active: #25222e;
      --bg-search: #1a191f;
      --bg-content: #121116;
      --bg-code-inline: #1f1e24;
      --bg-code-block: #0a0a0e;
      --text: #e4e2eb;
      --text-secondary: #9692a0;
      --text-tertiary: #6b6778;
      --border: #26242b;
      --border-light: #1e1c23;
      --accent: #a78bfa;
      --accent-light: #2a2540;
      --accent-bg: #1a1728;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
    }
    #content-area code {
      color: #c4b5fd;
      border-color: var(--border);
    }
    #content-area pre {
      box-shadow: var(--shadow-md);
    }
    #content-area pre code {
      color: #e2e8f0;
    }
    .search-result-item .snippet mark {
      background: #3f2e00;
      color: #facc15;
    }
    #error-toast {
      background: #2a2830;
      border: 1px solid var(--border);
    }
    #content-area blockquote {
      background: var(--accent-bg);
    }
    #sidebar {
      border-right-color: var(--border);
    }
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar" role="navigation" aria-label="笔记目录">
    <div class="sidebar-header">
      <div class="sidebar-header-top">
        <h1>
          <a href="/">
            <span class="logo-icon">✎</span>
            Notes
          </a>
        </h1>
        <div class="sidebar-actions">
          <button id="refresh-btn" title="刷新目录" aria-label="刷新目录">↻</button>
        </div>
      </div>
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="搜索笔记..." autocomplete="off" aria-label="搜索笔记">
      </div>
      <div class="search-count" id="search-count"></div>
    </div>
    <div id="tree-container"><div class="loading"><div class="spinner"></div>加载中</div></div>
  </div>
  <div id="main">
    <div id="main-header">
      <button id="menu-btn" aria-label="Toggle sidebar">☰</button>
      <div id="breadcrumb"></div>
    </div>
    <div id="content-wrapper">
      <div id="content-area">
        <div class="empty-state">
          <div class="icon-wrap">📖</div>
          <h2>欢迎来到笔记</h2>
          <p>从左侧目录选择一篇笔记开始阅读，或使用搜索框查找内容</p>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="error-toast"></div>

<script>
document.addEventListener('DOMContentLoaded', async function() {
  const CONFIG = {
    contentJson: 'content.json',
    defaultFile: 'README.md',
  };

  let treeData = null;
  let flatNotes = [];
  let searchIndex = null;
  let currentFile = null;

  const sidebar = document.getElementById('sidebar');
  const treeContainer = document.getElementById('tree-container');
  const contentArea = document.getElementById('content-area');
  const contentWrapper = document.getElementById('content-wrapper');
  const searchInput = document.getElementById('search-input');
  const searchCount = document.getElementById('search-count');
  const breadcrumb = document.getElementById('breadcrumb');
  const menuBtn = document.getElementById('menu-btn');
  const overlay = document.getElementById('sidebar-overlay');
  const toast = document.getElementById('error-toast');
  const refreshBtn = document.getElementById('refresh-btn');

  menuBtn.addEventListener('click', () => toggleSidebar());
  overlay.addEventListener('click', () => closeSidebar());

  function toggleSidebar() {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('show');
  }

  function showToast(msg, isError) {
    toast.textContent = msg;
    toast.style.display = 'block';
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => { toast.style.display = 'none'; }, 4000);
  }

  async function fetchJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Failed to load ${url}: ${res.status}`);
    return res.json();
  }

  async function fetchText(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Failed to load ${url}: ${res.status}`);
    return res.text();
  }

  function getFileUrl(filePath) {
    return filePath;
  }

  function getFileTitle(filePath) {
    if (!filePath) return '';
    const name = filePath.split('/').pop().replace(/\.md$/i, '');
    return name === 'README' ? '首页' : name;
  }

  function getDirName(filePath) {
    const parts = filePath.split('/');
    return parts.length > 1 ? parts.slice(0, -1).join(' / ') : '';
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  function highlightSearch(text, query) {
    if (!query.trim()) return escapeHtml(text);
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escapeHtml(text).replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
  }

  function debounce(fn, ms) {
    let timer;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => fn(...args), ms);
    };
  }

  async function loadIndex() {
    try {
      treeData = await fetchJSON(CONFIG.contentJson);
    } catch (e) {
      treeContainer.innerHTML = '<div class="empty-state" style="padding:40px 16px"><div class="icon-wrap" style="width:48px;height:48px;font-size:20px;margin-bottom:14px">⚠️</div><p style="font-size:13px;color:var(--text-tertiary)">未找到 content.json<br>请先运行生成脚本</p></div>';
      return false;
    }
    return true;
  }

  function flattenTree() {
    flatNotes = [];
    function walk(node, path) {
      const currentPath = path ? `${path}/${node.name}` : node.name;
      if (node.type === 'file') {
        flatNotes.push({
          path: currentPath,
          title: node.title || getFileTitle(currentPath),
          dir: getDirName(currentPath),
        });
      }
      if (node.children) {
        for (const child of node.children) {
          walk(child, currentPath);
        }
      }
    }
    if (treeData && treeData.children) {
      for (const child of treeData.children) {
        walk(child, '');
      }
    }
  }

  function renderTree() {
    treeContainer.innerHTML = '';
    const ul = document.createElement('ul');
    ul.className = 'tree-list';
    if (treeData && treeData.children) {
      for (const child of treeData.children) {
        ul.appendChild(renderTreeNode(child, ''));
      }
    }
    treeContainer.appendChild(ul);
  }

  function renderTreeNode(node, path) {
    const currentPath = path ? `${path}/${node.name}` : node.name;
    const li = document.createElement('li');
    li.className = 'tree-item';

    const content = document.createElement('div');
    content.className = 'tree-item-content';

    if (node.type === 'directory') {
      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = '▶';
      content.appendChild(arrow);

      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = '📁';
      content.appendChild(icon);

      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = node.name;
      content.appendChild(label);

      li.classList.add('children-hidden');
      content.addEventListener('click', (e) => {
        e.stopPropagation();
        li.classList.toggle('children-hidden');
        arrow.classList.toggle('expanded');
        icon.textContent = li.classList.contains('children-hidden') ? '📁' : '📂';
      });

      if (node.children && node.children.length > 0) {
        const childUl = document.createElement('ul');
        childUl.className = 'tree-list';
        for (const child of node.children) {
          childUl.appendChild(renderTreeNode(child, currentPath));
        }
        li.appendChild(childUl);
      }
    } else {
      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = '📄';
      content.appendChild(icon);

      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = node.title || getFileTitle(currentPath);
      content.appendChild(label);

      content.dataset.path = currentPath;
      content.addEventListener('click', (e) => {
        e.stopPropagation();
        loadFile(currentPath);
        closeSidebar();
      });
    }

    li.prepend(content);
    return li;
  }

  function updateActiveTreeItem(path) {
    document.querySelectorAll('.tree-item-content.active').forEach(el => el.classList.remove('active'));
    if (path) {
      const items = document.querySelectorAll('.tree-item-content');
      for (const item of items) {
        if (item.dataset.path === path) {
          item.classList.add('active');
          let parent = item.closest('.tree-item');
          while (parent) {
            parent.classList.remove('children-hidden');
            const arrow = parent.querySelector('.arrow');
            const icon = parent.querySelector('.tree-item-content .icon');
            if (arrow) arrow.classList.add('expanded');
            if (icon && icon.textContent === '📁') icon.textContent = '📂';
            parent = parent.parentElement?.closest('.tree-item');
          }
          break;
        }
      }
    }
  }

  function updateBreadcrumb(path) {
    breadcrumb.innerHTML = '';
    if (!path) { breadcrumb.innerHTML = '<span style="color:var(--text-tertiary)">欢迎</span>'; return; }
    const parts = path.replace(/\.md$/i, '').split('/');
    parts.forEach((part, i) => {
      if (i > 0) {
        const sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '/';
        breadcrumb.appendChild(sep);
      }
      const span = document.createElement('span');
      if (i === parts.length - 1) {
        const note = flatNotes.find(n => n.path === path);
        span.textContent = note ? note.title : getFileTitle(path);
        span.style.color = 'var(--text)';
        span.style.fontWeight = '500';
      } else {
        span.textContent = part;
      }
      breadcrumb.appendChild(span);
    });
  }

  function addCopyButtons() {
    contentArea.querySelectorAll('pre').forEach(pre => {
      if (pre.querySelector('.copy-btn')) return;
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = '复制';
      btn.addEventListener('click', async () => {
        const code = pre.querySelector('code');
        if (!code) return;
        try {
          await navigator.clipboard.writeText(code.textContent);
          btn.textContent = '已复制';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = '复制';
            btn.classList.remove('copied');
          }, 2000);
        } catch {
          btn.textContent = '失败';
          setTimeout(() => { btn.textContent = '复制'; }, 2000);
        }
      });
      pre.appendChild(btn);
    });
  }

  async function loadFile(filePath) {
    if (!filePath) return;
    currentFile = filePath;
    searchInput.value = '';
    searchCount.style.display = 'none';
    updateBreadcrumb(filePath);
    updateActiveTreeItem(filePath);
    contentArea.innerHTML = '<div class="loading"><div class="spinner"></div>加载中</div>';
    try {
      const md = await fetchText(getFileUrl(filePath));
      window.location.hash = '#' + filePath.replace(/\.md$/i, '');
      contentArea.innerHTML = marked.parse(md);
      contentArea.querySelectorAll('pre code').forEach((block) => {
        if (typeof hljs !== 'undefined') {
          hljs.highlightElement(block);
        }
      });
      addCopyButtons();
      contentWrapper.scrollTop = 0;
      contentArea.style.animation = 'none';
      requestAnimationFrame(() => {
        contentArea.style.animation = 'contentFadeIn 0.3s ease';
      });
    } catch (e) {
      contentArea.innerHTML = `<div class="empty-state"><div class="icon-wrap" style="font-size:24px">❌</div><h2>加载失败</h2><p>${escapeHtml(e.message)}</p></div>`;
    }
  }

  async function buildSearchIndex() {
    if (searchIndex) return searchIndex;
    searchIndex = {};
    const promises = flatNotes.map(async (note) => {
      try {
        const text = await fetchText(getFileUrl(note.path));
        searchIndex[note.path] = text;
      } catch {
        searchIndex[note.path] = '';
      }
    });
    await Promise.all(promises);
    return searchIndex;
  }

  async function performSearch(query) {
    const q = query.trim().toLowerCase();
    if (!q) {
      searchCount.style.display = 'none';
      if (currentFile) {
        loadFile(currentFile);
      } else {
        contentArea.innerHTML = `<div class="empty-state"><div class="icon-wrap">📖</div><h2>欢迎来到笔记</h2><p>从左侧目录选择一篇笔记开始阅读，或使用搜索框查找内容</p></div>`;
      }
      return;
    }
    contentArea.innerHTML = '<div class="loading"><div class="spinner"></div>搜索中</div>';
    const index = await buildSearchIndex();
    const results = [];
    for (const note of flatNotes) {
      const text = index[note.path] || '';
      const lower = text.toLowerCase();
      let pos = lower.indexOf(q);
      if (pos === -1) continue;
      const snippetStart = Math.max(0, pos - 40);
      const snippetEnd = Math.min(text.length, pos + q.length + 80);
      let snippet = text.slice(snippetStart, snippetEnd);
      if (snippetStart > 0) snippet = '...' + snippet;
      if (snippetEnd < text.length) snippet += '...';
      results.push({ ...note, snippet, matchPos: pos });
    }
    results.sort((a, b) => a.matchPos - b.matchPos);
    renderSearchResults(q, results);
  }

  function renderSearchResults(query, results) {
    searchCount.style.display = 'block';
    searchCount.textContent = `找到 ${results.length} 条结果`;
    if (results.length === 0) {
      contentArea.innerHTML = `<div class="empty-state"><div class="icon-wrap" style="font-size:24px">🔍</div><h2>未找到结果</h2><p>没有包含 "${escapeHtml(query)}" 的笔记</p></div>`;
      return;
    }
    let html = `<div id="search-results">`;
    html += `<h2 style="border:none;font-size:17px;font-weight:600;margin-bottom:16px">搜索结果：${escapeHtml(query)}</h2>`;
    for (const r of results) {
      html += `<div class="search-result-item" data-path="${escapeHtml(r.path)}">`;
      html += `<div class="path">${escapeHtml(r.path)}</div>`;
      html += `<div class="title">${escapeHtml(r.title)}</div>`;
      html += `<div class="snippet">${highlightSearch(r.snippet, query)}</div>`;
      html += `</div>`;
    }
    html += '</div>';
    contentArea.innerHTML = html;
    contentArea.querySelectorAll('.search-result-item').forEach(el => {
      el.addEventListener('click', () => {
        loadFile(el.dataset.path);
      });
    });
    updateActiveTreeItem(null);
    breadcrumb.innerHTML = '<span style="color:var(--text-secondary)">搜索结果</span>';
  }

  const debouncedSearch = debounce(performSearch, 300);
  searchInput.addEventListener('input', (e) => {
    debouncedSearch(e.target.value);
  });

  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
    }
    if (e.key === 'Escape') {
      searchInput.blur();
      closeSidebar();
    }
  });

  function handleHash() {
    const hash = window.location.hash.replace(/^#/, '');
    if (hash) {
      const filePath = hash.endsWith('.md') ? hash : hash + '.md';
      if (flatNotes.some(n => n.path === filePath)) {
        loadFile(filePath);
        return true;
      }
    }
    return false;
  }

  window.addEventListener('hashchange', () => {
    const hash = window.location.hash.replace(/^#/, '');
    if (hash) {
      const filePath = hash.endsWith('.md') ? hash : hash + '.md';
      if (flatNotes.some(n => n.path === filePath)) {
        loadFile(filePath);
      }
    }
  });

  refreshBtn.addEventListener('click', async () => {
    searchIndex = null;
    const ok = await loadIndex();
    if (ok) {
      flattenTree();
      renderTree();
      if (currentFile) {
        if (flatNotes.some(n => n.path === currentFile)) {
          loadFile(currentFile);
        } else {
          loadFile(CONFIG.defaultFile);
        }
      }
      showToast('目录已刷新');
    }
  });

  async function init() {
    const ok = await loadIndex();
    if (!ok) return;
    flattenTree();
    renderTree();
    if (!handleHash()) {
      if (flatNotes.some(n => n.path === CONFIG.defaultFile)) {
        loadFile(CONFIG.defaultFile);
      }
    }
  }

  if (typeof marked !== 'undefined') {
    marked.setOptions({
      gfm: true,
      breaks: false,
    });
  }

  init().catch(e => {
    showToast('初始化失败: ' + e.message);
  });
});
</script>
</body>
</html>
